# Managed tmux config for Code Companion's persistent Claude pane.
#
# Loaded via `tmux -f <this file>`, so it never touches the user's own
# ~/.tmux.conf. tmux runs *inside* our VTE widget — VTE still does all glyph
# rendering (font, padding, Dracula palette are unaffected). This file only
# makes tmux faithful to Claude Code's needs and otherwise invisible.

# --- Fidelity: what Claude Code's docs require (Configure-tmux) -------------
# Truecolor, so Claude's highlighting isn't clamped to 256 colors.
set -g  default-terminal "tmux-256color"
set -as terminal-features "xterm*:RGB"
# Shift+Enter and other extended keys reach Claude Code.
set -s  extended-keys on
set -as terminal-features "xterm*:extkeys"
# Let desktop notifications / progress-bar escape sequences pass through to the
# outer terminal (also what the future Notification-hook path relies on).
set -g  allow-passthrough on

# --- Make tmux invisible ----------------------------------------------------
set -g  status off              # no status bar
set -g  mouse on                # natural wheel scrolling (buffer is tmux's now)
set -g  history-limit 50000     # generous scrollback
set -sg escape-time 0           # no ESC delay (Claude/editor responsiveness)
set -g  destroy-unattached off  # session outlives the detached client
# Neutralize the prefix so tmux can't swallow app / Claude hotkeys. App-level
# shortcuts are handled at GTK/VTE before tmux ever sees them.
unbind-key C-b
