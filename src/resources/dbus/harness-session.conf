<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- Minimal session-bus config for the GUI test harness (issue #4).

     Deliberately has NO <standard_session_servicedirs/>: a bus with zero
     activatable services cannot auto-spawn the xdg-desktop-portal stack
     (~4 processes + ~4 inotify instances per harness run) or gvfs/secrets.
     The a11y stack is unaffected — gui_agent launches at-spi-bus-launcher
     and at-spi2-registryd manually, not via D-Bus activation. -->
<busconfig>
  <type>session</type>
  <listen>unix:tmpdir=/tmp</listen>
  <auth>EXTERNAL</auth>

  <policy context="default">
    <allow send_destination="*" eavesdrop="true"/>
    <allow eavesdrop="true"/>
    <allow own="*"/>
    <allow user="*"/>
  </policy>
</busconfig>
